<!DOCTYPE html>
<html>
<head>
<title>Fruit Catch Game</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="home">
<h1>🍓 Fruit Catch Game</h1>
<button onclick="startGame()">Start Game</button>
</div>

<div id="game">

<div class="top">
Score: <span id="score">0</span> |
Lives: <span id="lives">❤️❤️❤️</span> |
High Score: <span id="high">0</span>

<button onclick="togglePause()">Pause</button>
<button onclick="toggleMusic()">Music</button>
</div>

<div id="gameArea">
<div class="sky"></div>
<div id="basket">🧺</div>
</div>

</div>

<div id="gameOver">
<h2>Game Over</h2>
<h3>Your Score: <span id="finalScore"></span></h3>
<button onclick="restartGame()">Restart</button>
</div>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/audio/2023/03/06/audio_9a0f8c2df2.mp3">
</audio>

<audio id="catch">
<source src="https://cdn.pixabay.com/audio/2022/03/10/audio_2702d9b6b7.mp3">
</audio>

<audio id="boom">
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_5e5c6c6b9f.mp3">
</audio>

<script src="script.js"></script>

</body>
</html>
